<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Provas Inteligente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        body { font-family: 'Nunito', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // =========================================================================
        // 🔑 COLOQUE SUA CHAVE DE API DO GOOGLE GEMINI AQUI ABAIXO:
        // =========================================================================
        const apiKey = "AIzaSyA22gFo0F3nTFNTLXx2POHsCupcdtapKd0"; 
        // =========================================================================
        
        async function fetchGemini(prompt) {
            if (apiKey === "COLE_SUA_CHAVE_AQUI" || !apiKey) {
                throw new Error("Erro: Chave de API não configurada. Insira sua chave no código.");
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { responseMimeType: "application/json" }
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || "Erro ao conectar com a IA");
            }

            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            return JSON.parse(text);
        }

        function App() {
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [currentExam, setCurrentExam] = useState(null);
            const [userAnswers, setUserAnswers] = useState({});
            const [examsHistory, setExamsHistory] = useState([]);

            useEffect(() => {
                const saved = localStorage.getItem('exams_db');
                if (saved) setExamsHistory(JSON.parse(saved));
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, loading]);

            const handleCreateExam = async (formData) => {
                setLoading(true);
                try {
                    const prompt = `Crie uma prova de múltipla escolha:
                    Tema: ${formData.tema}
                    Série: ${formData.serie}
                    Matéria: ${formData.materia}
                    Nível: ${formData.nivel}
                    Quantidade: ${formData.quantidade}
                    JSON format: { "titulo": "string", "tempoLimitado": ${formData.tempo}, "questoes": [{ "id": 1, "enunciado": "string", "opcoes": ["a", "b", "c", "d"], "respostaCorretaIndex": 0, "dica": "string" }] }`;

                    const exam = await fetchGemini(prompt);
                    exam.id = Date.now();
                    exam.materia = formData.materia;
                    exam.serie = formData.serie;
                    exam.nivel = formData.nivel;
                    
                    setCurrentExam(exam);
                    setView('taking');
                } catch (err) {
                    alert(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {loading && (
                        <div className="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center">
                            <div className="loader mb-4"></div>
                            <p className="font-bold text-indigo-900">Gerando sua prova com IA...</p>
                        </div>
                    )}

                    <nav className="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-40 no-print">
                        <h1 className="font-bold text-xl text-indigo-600 cursor-pointer" onClick={() => setView('home')}>ProvasSmart</h1>
                        <button onClick={() => setView('create')} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold">Nova Prova</button>
                    </nav>

                    <main className="p-4 max-w-4xl mx-auto w-full">
                        {view === 'home' && <HomeView onStart={() => setView('create')} history={examsHistory} />}
                        {view === 'create' && <CreateForm onSubmit={handleCreateExam} />}
                        {view === 'taking' && <TakingView exam={currentExam} onFinish={(ans) => { 
                            setUserAnswers(ans); 
                            const historyItem = {...currentExam, userAnswers: ans, date: new Date().toISOString()};
                            const newHistory = [historyItem, ...examsHistory];
                            setExamsHistory(newHistory);
                            localStorage.setItem('exams_db', JSON.stringify(newHistory));
                            setView('results'); 
                        }} />}
                        {view === 'results' && <ResultsView exam={currentExam} answers={userAnswers} onHome={() => setView('home')} />}
                    </main>
                </div>
            );
        }

        function HomeView({ onStart, history }) {
            return (
                <div className="text-center py-12 fade-in">
                    <h2 className="text-4xl font-black mb-4">Bem-vindo ao Gerador de Provas</h2>
                    <p className="text-slate-500 mb-8">Crie avaliações personalizadas em segundos usando inteligência artificial.</p>
                    <button onClick={onStart} className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold text-xl shadow-lg">Começar Agora</button>
                    
                    {history.length > 0 && (
                        <div className="mt-12 text-left">
                            <h3 className="font-bold text-lg mb-4">Histórico Recente</h3>
                            <div className="grid gap-4">
                                {history.slice(0, 3).map(ex => (
                                    <div key={ex.id} className="bg-white p-4 rounded-xl border flex justify-between items-center">
                                        <span>{ex.titulo}</span>
                                        <span className="text-xs text-slate-400">{ex.materia}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function CreateForm({ onSubmit }) {
            const [form, setForm] = useState({ tema: '', serie: '6º ano', materia: 'História', nivel: 'Médio', quantidade: 5, tempo: 0 });

            const handleSubmit = (e) => {
                e.preventDefault(); // IMPEDE O REFRESH DA PAGINA
                if(!form.tema) return alert("Digite um tema!");
                onSubmit(form);
            };

            return (
                <form onSubmit={handleSubmit} className="bg-white p-6 rounded-3xl shadow-sm border space-y-4 fade-in">
                    <h2 className="text-2xl font-bold mb-4">Configurar Prova</h2>
                    <div>
                        <label className="block font-bold mb-1">Tema da Prova</label>
                        <input type="text" className="w-full p-3 bg-slate-50 border rounded-xl" placeholder="Ex: Fotossíntese" 
                        value={form.tema} onChange={e => setForm({...form, tema: e.target.value})} />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <label className="block font-bold mb-1">Série</label>
                            <select className="w-full p-3 bg-slate-50 border rounded-xl" value={form.serie} onChange={e => setForm({...form, serie: e.target.value})}>
                                <option>6º ano</option><option>7º ano</option><option>8º ano</option><option>Ensino Médio</option>
                            </select>
                        </div>
                        <div>
                            <label className="block font-bold mb-1">Matéria</label>
                            <select className="w-full p-3 bg-slate-50 border rounded-xl" value={form.materia} onChange={e => setForm({...form, materia: e.target.value})}>
                                <option>História</option><option>Ciências</option><option>Matemática</option><option>Português</option>
                            </select>
                        </div>
                    </div>
                    <div className="grid grid-cols-3 gap-4">
                        <div>
                            <label className="block font-bold mb-1">Dificuldade</label>
                            <select className="w-full p-3 bg-slate-50 border rounded-xl" value={form.nivel} onChange={e => setForm({...form, nivel: e.target.value})}>
                                <option>Fácil</option><option>Médio</option><option>Difícil</option>
                            </select>
                        </div>
                        <div>
                            <label className="block font-bold mb-1">Questões</label>
                            <input type="number" className="w-full p-3 bg-slate-50 border rounded-xl" value={form.quantidade} onChange={e => setForm({...form, quantidade: e.target.value})} />
                        </div>
                        <div>
                            <label className="block font-bold mb-1">Tempo (min)</label>
                            <select className="w-full p-3 bg-slate-50 border rounded-xl" value={form.tempo} onChange={e => setForm({...form, tempo: e.target.value})}>
                                <option value="0">Sem tempo</option>
                                <option value="10">10 min</option>
                                <option value="30">30 min</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" className="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold text-lg mt-4">Gerar Prova</button>
                </form>
            );
        }

        function TakingView({ exam, onFinish }) {
            const [answers, setAnswers] = useState({});
            const [timeLeft, setTimeLeft] = useState(exam.tempoLimitado ? exam.tempoLimitado * 60 : null);

            useEffect(() => {
                if (timeLeft === null) return;
                if (timeLeft <= 0) { onFinish(answers); return; }
                const timer = setInterval(() => setTimeLeft(t => t - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft]);

            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;

            return (
                <div className="pb-20 fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">{exam.titulo}</h2>
                        {timeLeft !== null && (
                            <div className="fixed bottom-4 right-4 bg-slate-900 text-white px-4 py-2 rounded-full font-mono text-xl z-50">
                                {formatTime(timeLeft)}
                            </div>
                        )}
                    </div>

                    <div className="space-y-6">
                        {exam.questoes.map((q, idx) => (
                            <div key={q.id} className="bg-white p-6 rounded-2xl border shadow-sm">
                                <p className="font-bold text-lg mb-4">{idx + 1}. {q.enunciado}</p>
                                <div className="space-y-2">
                                    {q.opcoes.map((opt, i) => (
                                        <label key={i} className={`flex items-center p-3 border rounded-xl cursor-pointer transition ${answers[q.id] === i ? 'bg-indigo-50 border-indigo-500' : 'hover:bg-slate-50'}`}>
                                            <input type="radio" name={`q-${q.id}`} className="mr-3" onChange={() => setAnswers({...answers, [q.id]: i})} checked={answers[q.id] === i} />
                                            {opt}
                                        </label>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                    <button onClick={() => onFinish(answers)} className="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold mt-8">Finalizar e Entregar</button>
                </div>
            );
        }

        function ResultsView({ exam, answers, onHome }) {
            const score = exam.questoes.reduce((acc, q) => acc + (answers[q.id] === q.respostaCorretaIndex ? 1 : 0), 0);
            const percent = Math.round((score / exam.questoes.length) * 100);

            return (
                <div className="fade-in">
                    <div className="bg-white p-8 rounded-3xl border text-center mb-8">
                        <h2 className="text-3xl font-bold mb-2">Resultado: {percent}%</h2>
                        <p className="text-slate-500">Você acertou {score} de {exam.questoes.length} questões.</p>
                        <button onClick={onHome} className="mt-6 text-indigo-600 font-bold">Voltar ao Início</button>
                        <button onClick={() => window.print()} className="ml-4 no-print bg-slate-100 p-2 rounded-lg">Imprimir PDF</button>
                    </div>

                    <div className="space-y-4">
                        {exam.questoes.map((q, idx) => {
                            const isCorrect = answers[q.id] === q.respostaCorretaIndex;
                            return (
                                <div key={q.id} className={`p-4 rounded-xl border ${isCorrect ? 'bg-emerald-50' : 'bg-red-50'}`}>
                                    <p className="font-bold">{idx+1}. {q.enunciado}</p>
                                    <p className="text-sm mt-2">Sua resposta: <span className={isCorrect ? 'text-emerald-700 font-bold' : 'text-red-700'}>{q.opcoes[answers[q.id]] || "Não respondida"}</span></p>
                                    {!isCorrect && <p className="text-sm text-emerald-700">Correta: {q.opcoes[q.respostaCorretaIndex]}</p>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
